services:
  campaign-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moody-campaign-engine
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=False
    ports:
      - "5001:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - uploads-data:/app/backend/uploads

volumes:
  uploads-data:
